spring:
  application:
    name: nktprocess
  mongodb:
      uri: mongodb://localhost:27017/nktdb
      database: nktdb
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8070
  servlet:
    context-path: /

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt:
  secret: bm10LXNlY3JldC1rZXktZm9yLW5hbW1ha2FkYWl0aGVydS1hcGktMjAyNA==
  expiration: 9000000000
  refresh-expiration: 259200000000
otp:
  expiration: 30     # 3 mins

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.controller: DEBUG
    com.service: DEBUG
    com.security: INFO
    org.springframework.security: INFO
