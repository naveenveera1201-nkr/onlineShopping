apis:
  - id: discover-list-categories
    name: List All Categories
    version: v1
    method: GET
    path: /api/v1/categories
    description: Returns all active service and product categories with display metadata including emoji, colour, badge and
      type.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - PUBLIC
      authorization:
        enabled: false
      rateLimit:
        enabled: true
        requestsPerMinute: 30
        requestsPerHour: 500
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters: []
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: Category identifier
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: response data
      - name: currentStatus
        type: String
        description: Current record status
        defaultValue: ACTIVE
      - name: fetchedAt
        type: LocalDateTime
        description: Data retrieval timestamp
    businessLogic:
      businessLogicRequired: "Y"
      processCode: p112
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: SELECT
        entity: Category
