apis:
  - id: stores-get-availability
    name: Get Available Time Slots
    version: v1
    method: GET
    path: /api/v1/stores/{storeId}/availability
    description: Returns available booking slots for a given service and date range.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - PUBLIC
      authorization:
        enabled: false
      rateLimit:
        enabled: true
        requestsPerMinute: 30
        requestsPerHour: 500
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters:
      - name: storeId
        type: String
        location: PATH
        required: true
        validation:
          minLength: 1
          errorMessage: Store ID is required
      - name: serviceId
        type: String
        location: QUERY
        required: true
        validation:
          minLength: 1
          errorMessage: Service ID is required
      - name: fromDate
        type: String
        location: QUERY
        required: true
        validation:
          pattern: ^\d{4}-\d{2}-\d{2}$
          errorMessage: fromDate must be in YYYY-MM-DD format
      - name: toDate
        type: String
        location: QUERY
        required: false
        validation:
          pattern: ^\d{4}-\d{2}-\d{2}$
          errorMessage: toDate must be in YYYY-MM-DD format
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: TimeSlot identifier
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: response data
      - name: currentStatus
        type: String
        description: Current record status
        defaultValue: ACTIVE
      - name: fetchedAt
        type: LocalDateTime
        description: Data retrieval timestamp
    businessLogic:
      businessLogicRequired: "Y"
      processCode: p119
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: SELECT
        entity: TimeSlot
        mapping:
          storeId: "#{request.storeId}"
          serviceId: "#{request.serviceId}"
          fromDate: "#{request.fromDate}"
          toDate: "#{request.toDate}"