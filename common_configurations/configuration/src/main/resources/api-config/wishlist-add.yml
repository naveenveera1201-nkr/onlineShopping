apis:
  - id: wishlist-add
    name: Add Item to Wishlist
    version: v1
    method: POST
    path: /api/v1/customer/wishlist/{itemId}
    description: Adds an item to the customer's wishlist. Idempotent — no error if item already saved.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - CUSTOMER
      authorization:
        enabled: true
      rateLimit:
        enabled: true
        requestsPerMinute: 60
        requestsPerHour: 1000
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters:
      - name: itemId
        type: String
        location: PATH
        required: true
        validation:
          minLength: 1
          errorMessage: Item ID is required
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: Generated WishlistItem ID
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: registered data
      - name: currentStatus
        type: String
        description: Record status
        defaultValue: ACTIVE
      - name: createdAt
        type: LocalDateTime
        description: Creation timestamp
      - name: createdBy
        type: String
        description: created by
    businessLogic:
      businessLogicRequired: "Y"
      processCode: p131
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: INSERT
        entity: WishlistItem
        mapping:
          createdAt: "#{now()}"
          status: ACTIVE
    callbacks:
    - event: SUCCESS
      type: WEBHOOK
      url: "https://api.nammakadaitheru.in/webhooks/wishlistitem-event"
