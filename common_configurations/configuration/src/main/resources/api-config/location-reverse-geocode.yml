apis:
  - id: location-reverse-geocode
    name: Reverse Geocode Location
    version: v1
    method: GET
    path: /api/v1/location/geocode
    description: Converts GPS coordinates to a readable address for auto-filling the delivery address field during checkout.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - CUSTOMER
      authorization:
        enabled: true
      rateLimit:
        enabled: true
        requestsPerMinute: 60
        requestsPerHour: 1000
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters:
      - name: latitude
        type: Double
        location: QUERY
        required: true
        validation:
          min: -90.0
          max: 90.0
          errorMessage: Latitude must be between -90 and 90
      - name: longitude
        type: Double
        location: QUERY
        required: true
        validation:
          min: -180.0
          max: 180.0
          errorMessage: Longitude must be between -180 and 180
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: GeoLocation identifier
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: response data
      - name: currentStatus
        type: String
        description: Current record status
        defaultValue: ACTIVE
      - name: fetchedAt
        type: LocalDateTime
        description: Data retrieval timestamp
    businessLogic:
      businessLogicRequired: "Y"
      processCode: p134
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: SELECT
        entity: GeoLocation
        mapping:
          latitude: "#{request.latitude}"
          longitude: "#{request.longitude}"
