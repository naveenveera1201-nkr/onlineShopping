apis:
  - id: customer-get-profile
    name: Get Customer Profile
    version: v1
    method: GET
    path: /api/v1/customer/profile
    description: Returns the authenticated customer's full profile including saved addresses, favourite stores, and order stats.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - customer
      authorization:
        enabled: true
      rateLimit:
        enabled: true
        requestsPerMinute: 60
        requestsPerHour: 1000
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters: []
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: CustomerProfile identifier
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: response data
      - name: currentStatus
        type: String
        description: Current record status
        defaultValue: ACTIVE
      - name: fetchedAt
        type: LocalDateTime
        description: Data retrieval timestamp
    businessLogic:
      businessLogicRequired: "Y"
      processCode: nkt.customer.get_profile
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: SELECT
        entity: CustomerProfile
