apis:
  - id: stores-get-details
    name: Get Store Details
    version: v1
    method: GET
    path: /api/v1/stores/{storeId}
    description: Returns the full store profile including operating hours, rating breakdown, and current open/closed status.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - PUBLIC
      authorization:
        enabled: false
      rateLimit:
        enabled: true
        requestsPerMinute: 30
        requestsPerHour: 500
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters:
      - name: storeId
        type: String
        location: PATH
        required: true
        validation:
          minLength: 1
          errorMessage: Store ID is required
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: Store identifier
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: response data
      - name: currentStatus
        type: String
        description: Current record status
        defaultValue: ACTIVE
      - name: fetchedAt
        type: LocalDateTime
        description: Data retrieval timestamp
    businessLogic:
      businessLogicRequired: "Y"
      processCode: p116
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: SELECT
        entity: Store
        mapping:
          storeId: "#{request.storeId}"
    