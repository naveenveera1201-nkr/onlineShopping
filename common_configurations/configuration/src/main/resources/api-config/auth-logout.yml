apis:
  - id: auth-logout
    name: Logout / Revoke Token
    version: v1
    method: POST
    path: /api/v1/auth/logout
    description: Revokes the current refresh token on the server, effectively signing the user out on this device.
    enabled: true
    security:
      authentication:
        enabled: false
        type: JWT
        roles:
        - CUSTOMER
        - BUSINESS
      authorization:
        enabled: true
      rateLimit:
        enabled: true
        requestsPerMinute: 60
        requestsPerHour: 1000
      encryption:
        enabled: true
        algorithm: AES256
#    request:
#      contentType: application/json
#      parameters:
#      - name: token
#        type: String
#        location: BODY
#        required: true
#        sensitive: true
#        validation:
#          minLength: 1
#          errorMessage: accessToken token is required
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: Generated Session ID
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: registered data
      - name: currentStatus
        type: String
        description: Record status
        defaultValue: ACTIVE
      - name: createdAt
        type: LocalDateTime
        description: Creation timestamp
      - name: createdBy
        type: String
        description: created by
    businessLogic:
      businessLogicRequired: "Y"
      processCode: nkt.auth.logout
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: INSERT
        entity: Session
        mapping:
          refreshToken: "#{encrypted(request.refreshToken)}"
          createdAt: "#{now()}"
          status: ACTIVE
    callbacks:
    - event: SUCCESS
      type: WEBHOOK
      url: "https://api.nammakadaitheru.in/webhooks/session-event"
