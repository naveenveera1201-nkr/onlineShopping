apis:
  - id: wishlist-get
    name: Get Wishlist Items
    version: v1
    method: GET
    path: /api/v1/customer/wishlist
    description: Returns all items the customer has saved (heart-marked), with current price and availability status.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - CUSTOMER
      authorization:
        enabled: true
      rateLimit:
        enabled: true
        requestsPerMinute: 60
        requestsPerHour: 1000
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters: []
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: WishlistItem identifier
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: response data
      - name: currentStatus
        type: String
        description: Current record status
        defaultValue: ACTIVE
      - name: fetchedAt
        type: LocalDateTime
        description: Data retrieval timestamp
    businessLogic:
      businessLogicRequired: "Y"
      processCode: p130
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: SELECT
        entity: WishlistItem
    