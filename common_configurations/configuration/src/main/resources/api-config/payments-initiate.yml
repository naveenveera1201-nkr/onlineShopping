apis:
  - id: payments-initiate
    name: Initiate Payment
    version: v1
    method: POST
    path: /api/v1/payments/initiate
    description: Creates a payment session and returns the UPI deep-link or net banking redirect URL. Called before order placement
      for prepaid methods.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - CUSTOMER
      authorization:
        enabled: true
      rateLimit:
        enabled: true
        requestsPerMinute: 60
        requestsPerHour: 1000
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters:
      - name: orderId
        type: String
        location: BODY
        required: true
        validation:
          minLength: 1
          errorMessage: Order ID is required
      - name: amount
        type: Long
        location: BODY
        required: true
        validation:
          min: 1
          errorMessage: Amount must be greater than 0 (in paise)
      - name: method
        type: String
        location: BODY
        required: true
        validation:
          pattern: ^(upi|netbanking)$
          errorMessage: method must be 'upi' or 'netbanking'
      - name: upiId
        type: String
        location: BODY
        required: false
        validation:
          pattern: ^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+$
          errorMessage: Invalid UPI ID format
      - name: bankCode
        type: String
        location: BODY
        required: false
        validation:
          minLength: 2
          maxLength: 20
          errorMessage: Invalid bank code
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: Generated Payment ID
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: registered data
      - name: currentStatus
        type: String
        description: Record status
        defaultValue: ACTIVE
      - name: createdAt
        type: LocalDateTime
        description: Creation timestamp
      - name: createdBy
        type: String
        description: created by
    businessLogic:
      businessLogicRequired: "Y"
      processCode: p127
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: INSERT
        entity: Payment
        mapping:
          orderId: "#{request.orderId}"
          amount: "#{request.amount}"
          method: "#{request.method}"
          upiId: "#{request.upiId}"
          bankCode: "#{request.bankCode}"
          createdAt: "#{now()}"
          status: ACTIVE
    callbacks:
    - event: SUCCESS
      type: WEBHOOK
      url: "https://api.nammakadaitheru.in/webhooks/payment-event"
