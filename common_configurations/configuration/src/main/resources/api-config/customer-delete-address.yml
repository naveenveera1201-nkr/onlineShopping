apis:
  - id: customer-delete-address
    name: Delete Saved Address
    version: v1
    method: DELETE
    path: /api/v1/customer/addresses/{addressId}
    description: Permanently removes a saved address by its ID.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - customer
      authorization:
        enabled: true
      rateLimit:
        enabled: true
        requestsPerMinute: 60
        requestsPerHour: 1000
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters:
      - name: addressId
        type: String
        location: PATH
        required: true
        validation:
          minLength: 1
          errorMessage: Address ID is required
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: ID of the deleted Address
      - name: currentStatus
        type: String
        description: Status after deletion
        defaultValue: DELETED
      - name: message
        type: String
        description: Deletion confirmation message
    businessLogic:
      businessLogicRequired: "Y"
      processCode: nkt.customer.delete_address
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: DELETE
        entity: Address
        mapping:
          addressId: "#{request.addressId}"
