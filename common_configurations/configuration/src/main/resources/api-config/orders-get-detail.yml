apis:
  - id: orders-get-detail
    name: Get Order Detail
    version: v1
    method: GET
    path: /api/v1/orders/{orderId}
    description: Returns full detail of a single order including item list, status timeline, and current delivery estimate.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - CUSTOMER
      authorization:
        enabled: true
      rateLimit:
        enabled: true
        requestsPerMinute: 60
        requestsPerHour: 1000
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters:
      - name: orderId
        type: String
        location: PATH
        required: true
        validation:
          minLength: 1
          errorMessage: Order ID is required
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: Order identifier
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: response data
      - name: currentStatus
        type: String
        description: Current record status
        defaultValue: ACTIVE
      - name: fetchedAt
        type: LocalDateTime
        description: Data retrieval timestamp
    businessLogic:
      businessLogicRequired: "Y"
      processCode: p123
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: SELECT
        entity: Order
        mapping:
          orderId: "#{request.orderId}"
