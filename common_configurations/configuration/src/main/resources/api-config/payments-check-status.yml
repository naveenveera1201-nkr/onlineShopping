apis:
  - id: payments-check-status
    name: Check Payment Status
    version: v1
    method: GET
    path: /api/v1/payments/{paymentId}/status
    description: Polls payment gateway for the current status. App polls this after UPI app returns focus.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - CUSTOMER
      authorization:
        enabled: true
      rateLimit:
        enabled: true
        requestsPerMinute: 60
        requestsPerHour: 1000
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters:
      - name: paymentId
        type: String
        location: PATH
        required: true
        validation:
          minLength: 1
          errorMessage: Payment ID is required
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: Payment identifier
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: response data
      - name: currentStatus
        type: String
        description: Current record status
        defaultValue: ACTIVE
      - name: fetchedAt
        type: LocalDateTime
        description: Data retrieval timestamp
    businessLogic:
      businessLogicRequired: "Y"
      processCode: p128
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: SELECT
        entity: Payment
        mapping:
          paymentId: "#{request.paymentId}"
    