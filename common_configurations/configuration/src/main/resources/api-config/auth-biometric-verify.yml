apis:
  - id: auth-biometric-verify
    name: Sign In via Biometric
    version: v1
    method: POST
    path: /api/v1/auth/biometric/verify
    description: Verifies the biometric token stored on the device and returns a session. No OTP required.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - PUBLIC
      authorization:
        enabled: false
      rateLimit:
        enabled: true
        requestsPerMinute: 10
        requestsPerHour: 100
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters:
      - name: deviceId
        type: String
        location: BODY
        required: true
        validation:
          minLength: 1
          errorMessage: Device ID is required
      - name: biometricToken
        type: String
        location: BODY
        required: true
        sensitive: true
        validation:
          minLength: 1
          errorMessage: Biometric token is required
      - name: userType
        type: String
        location: BODY
        required: true
        validation:
          pattern: ^(customer|store)$
          errorMessage: userType must be 'customer' or 'store'
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: Generated AuthToken ID
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: registered data
      - name: currentStatus
        type: String
        description: Record status
        defaultValue: ACTIVE
      - name: createdAt
        type: LocalDateTime
        description: Creation timestamp
      - name: createdBy
        type: String
        description: created by
    businessLogic:
      businessLogicRequired: "Y"
      processCode: p105
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: INSERT
        entity: AuthToken
        mapping:
          deviceId: "#{request.deviceId}"
          biometricToken: "#{encrypted(request.biometricToken)}"
          userType: "#{request.userType}"
          createdAt: "#{now()}"
          status: ACTIVE
    callbacks:
    - event: SUCCESS
      type: WEBHOOK
      url: "https://api.nammakadaitheru.in/webhooks/authtoken-event"
