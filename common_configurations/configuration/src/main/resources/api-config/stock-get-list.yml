apis:
  - id: stock-get-list
    name: Get Full Stock List
    version: v1
    method: GET
    path: /api/v1/store/stock
    description: Returns all products in the store's catalogue with current quantity and availability status.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - STORE
      authorization:
        enabled: true
      rateLimit:
        enabled: true
        requestsPerMinute: 60
        requestsPerHour: 1000
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters:
      - name: category
        type: String
        location: QUERY
        required: false
        validation:
          minLength: 1
          errorMessage: Category must be a valid string
      - name: available
        type: Boolean
        location: QUERY
        required: false
        validation:
          errorMessage: available must be a boolean
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: StockItem identifier
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: response data
      - name: currentStatus
        type: String
        description: Current record status
        defaultValue: ACTIVE
      - name: fetchedAt
        type: LocalDateTime
        description: Data retrieval timestamp
    businessLogic:
      businessLogicRequired: "Y"
      processCode: p140
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: SELECT
        entity: StockItem
        mapping:
          category: "#{request.category}"
          available: "#{request.available}"
