apis:
  - id: payments-webhook
    name: Payment Gateway Webhook
    version: v1
    method: POST
    path: /api/v1/payments/webhook
    description: Received by the backend from the payment gateway on payment completion events. Not called by the mobile app
      directly.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - PUBLIC
      authorization:
        enabled: false
      rateLimit:
        enabled: true
        requestsPerMinute: 10
        requestsPerHour: 100
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters:
      - name: payload
        type: Object
        location: BODY
        required: true
        validation:
          errorMessage: Signed gateway webhook payload is required
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: Generated PaymentWebhook ID
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: registered data
      - name: currentStatus
        type: String
        description: Record status
        defaultValue: ACTIVE
      - name: createdAt
        type: LocalDateTime
        description: Creation timestamp
      - name: createdBy
        type: String
        description: created by
    businessLogic:
      businessLogicRequired: "Y"
      processCode: p129
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: INSERT
        entity: PaymentWebhook
        mapping:
          payload: "#{request.payload}"
          createdAt: "#{now()}"
          status: ACTIVE
    callbacks:
    - event: SUCCESS
      type: WEBHOOK
      url: "https://api.nammakadaitheru.in/webhooks/paymentwebhook-event"
