apis:
  - id: cart-validate
    name: Validate Cart Before Checkout
    version: v1
    method: POST
    path: /api/v1/cart/validate
    description: Confirms all cart items are still in stock at the selected store before the customer proceeds to checkout.
      Returns updated prices.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - CUSTOMER
      authorization:
        enabled: true
      rateLimit:
        enabled: true
        requestsPerMinute: 60
        requestsPerHour: 1000
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters:
      - name: storeId
        type: String
        location: BODY
        required: true
        validation:
          minLength: 1
          errorMessage: Store ID is required
      - name: items
        type: Array
        location: BODY
        required: true
        validation:
          minLength: 1
          errorMessage: Cart must contain at least one item
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: Generated Cart ID
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: registered data
      - name: currentStatus
        type: String
        description: Record status
        defaultValue: ACTIVE
      - name: createdAt
        type: LocalDateTime
        description: Creation timestamp
      - name: createdBy
        type: String
        description: created by
    businessLogic:
      businessLogicRequired: "Y"
      processCode: p120
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: INSERT
        entity: Cart
        mapping:
          storeId: "#{request.storeId}"
          items: "#{request.items}"
          createdAt: "#{now()}"
          status: ACTIVE
    callbacks:
    - event: SUCCESS
      type: WEBHOOK
      url: "https://api.nammakadaitheru.in/webhooks/cart-event"
