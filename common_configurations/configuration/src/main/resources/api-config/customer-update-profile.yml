apis:
  - id: customer-update-profile
    name: Update Customer Profile
    version: v1
    method: PUT
    path: /api/v1/customer/update
    description: Updates the customer's display name or email address.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - customer
      authorization:
        enabled: true
      rateLimit:
        enabled: true
        requestsPerMinute: 60
        requestsPerHour: 1000
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters:
      - name: name
        type: String
        location: BODY
        required: false
        validation:
          minLength: 1
          maxLength: 100
          errorMessage: Name must be 1-100 characters
      - name: email
        type: String
        location: BODY
        required: false
        validation:
          pattern: ^[A-Za-z0-9+_.-]+@(.+)$
          customRule: VALID_EMAIL
          errorMessage: Invalid email format
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: Updated CustomerProfile ID
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: updated data
      - name: currentStatus
        type: String
        description: Record status after update
        defaultValue: ACTIVE
      - name: updatedAt
        type: LocalDateTime
        description: Update timestamp
      - name: updatedBy
        type: String
        description: Actor who performed the update
    businessLogic:
      businessLogicRequired: "Y"
      processCode: nkt.customer.update_profile
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: UPDATE
        entity: CustomerProfile
        mapping:
          name: "#{request.name}"
          email: "#{request.email}"
          updatedAt: "#{now()}"
    callbacks:
    - event: SUCCESS
      type: WEBHOOK
      url: "https://api.nammakadaitheru.in/webhooks/customerprofile-event"
