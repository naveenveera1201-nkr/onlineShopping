apis:
  - id: discover-get-banner
    name: Get Hero Banner
    version: v1
    method: GET
    path: /api/v1/discover/banner
    description: Returns the featured promotional banner content for the home screen. Content is CMS-managed.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - CUSTOMER
      authorization:
        enabled: true
      rateLimit:
        enabled: true
        requestsPerMinute: 60
        requestsPerHour: 1000
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters: []
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: Banner identifier
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: response data
      - name: currentStatus
        type: String
        description: Current record status
        defaultValue: ACTIVE
      - name: fetchedAt
        type: LocalDateTime
        description: Data retrieval timestamp
    businessLogic:
      businessLogicRequired: "Y"
      processCode: p113
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: SELECT
        entity: Banner
