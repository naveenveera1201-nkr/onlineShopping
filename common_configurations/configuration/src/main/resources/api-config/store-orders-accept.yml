apis:
  - id: store-orders-accept
    name: Accept Order - Full or Partial
    version: v1
    method: POST
    path: /api/v1/store/orders/{orderId}/accept
    description: Accepts an incoming order. Set partial=true and provide fulfilledItems to fulfil only available items. Customer
      notified of skipped items.
    enabled: true
    security:
      authentication:
        enabled: true
        type: JWT
        roles:
        - STORE
      authorization:
        enabled: true
      rateLimit:
        enabled: true
        requestsPerMinute: 60
        requestsPerHour: 1000
      encryption:
        enabled: true
        algorithm: AES256
    request:
      contentType: application/json
      parameters:
      - name: orderId
        type: String
        location: PATH
        required: true
        validation:
          minLength: 1
          errorMessage: Order ID is required
      - name: partial
        type: Boolean
        location: BODY
        required: true
        validation:
          customRule: MUST_BE_BOOLEAN
          errorMessage: partial must be a boolean value
      - name: fulfilledItems
        type: Array
        location: BODY
        required: false
        validation:
          minLength: 1
          errorMessage: fulfilledItems is required when partial=true
      - name: storeNote
        type: String
        location: BODY
        required: false
        validation:
          maxLength: 500
          errorMessage: Store note must be under 500 characters
    response:
      successCode: 200
      contentType: application/json
      fields:
      - name: id
        type: Long
        description: Generated StoreOrder ID
      - name: history
        type: String
        description: history
      - name: data
        type: String
        description: registered data
      - name: currentStatus
        type: String
        description: Record status
        defaultValue: ACTIVE
      - name: createdAt
        type: LocalDateTime
        description: Creation timestamp
      - name: createdBy
        type: String
        description: created by
    businessLogic:
      businessLogicRequired: "Y"
      processCode: p148
      type: CUSTOM_SERVICE
      dataSource: primaryDb
      operations:
      - type: INSERT
        entity: StoreOrder
        mapping:
          partial: "#{request.partial}"
          fulfilledItems: "#{request.fulfilledItems}"
          storeNote: "#{request.storeNote}"
          createdAt: "#{now()}"
          status: ACTIVE
    callbacks:
    - event: SUCCESS
      type: WEBHOOK
      url: "https://api.nammakadaitheru.in/webhooks/storeorder-event"
